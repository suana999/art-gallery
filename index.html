<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Canvas — 명화 갤러리</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0d0b;
    --bg-soft: #1a1814;
    --ink: #ece7de;
    --ink-soft: #a8a195;
    --accent: #c9a96e;
    --line: rgba(236, 231, 222, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Serif KR', 'Cormorant Garamond', serif;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* Hero */
  header.hero {
    height: 100vh;
    min-height: 600px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 2rem;
    position: relative;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(201, 169, 110, 0.08), transparent 60%),
      var(--bg);
  }
  header.hero::after {
    content: '';
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, transparent, var(--accent));
    animation: drop 2.4s ease-in-out infinite;
  }
  @keyframes drop {
    0%, 100% { opacity: 0.2; transform: translateX(-50%) translateY(0); }
    50% { opacity: 1; transform: translateX(-50%) translateY(8px); }
  }
  .eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--accent);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }
  h1.title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(3rem, 8vw, 6.5rem);
    letter-spacing: -0.01em;
    line-height: 1.05;
    margin-bottom: 1.5rem;
  }
  h1.title em {
    font-style: italic;
    color: var(--accent);
  }
  .lead {
    max-width: 620px;
    color: var(--ink-soft);
    font-weight: 300;
    font-size: 1.05rem;
  }

  /* Section */
  section.gallery {
    padding: 6rem 2rem 8rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  .section-head {
    text-align: center;
    margin-bottom: 5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--line);
  }
  .section-head .eyebrow {
    margin-top: 2rem;
  }
  .section-head h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(2rem, 4vw, 3rem);
    margin-bottom: 1rem;
  }
  .section-head p {
    color: var(--ink-soft);
    max-width: 560px;
    margin: 0 auto;
    font-weight: 300;
  }

  /* Cards */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 3rem 2rem;
  }
  .card {
    cursor: pointer;
    transition: transform 0.5s cubic-bezier(.2,.8,.2,1);
  }
  .card:hover { transform: translateY(-6px); }
  .card .frame {
    overflow: hidden;
    background: var(--bg-soft);
    aspect-ratio: 4 / 5;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.25rem;
    box-shadow: 0 30px 60px -30px rgba(0,0,0,0.8);
  }
  .card .frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 1.2s cubic-bezier(.2,.8,.2,1), filter 0.6s ease;
    filter: saturate(0.95);
  }
  .card:hover .frame img {
    transform: scale(1.05);
    filter: saturate(1.1);
  }
  .card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 1.55rem;
    line-height: 1.2;
    margin-bottom: 0.35rem;
  }
  .card .meta {
    color: var(--ink-soft);
    font-size: 0.9rem;
    font-weight: 300;
  }
  .card .meta .artist { color: var(--accent); font-style: italic; }

  /* Modal */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(8, 7, 6, 0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .modal.open { display: flex; opacity: 1; }
  .modal-inner {
    max-width: 1100px;
    width: 100%;
    max-height: 90vh;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 3rem;
    align-items: center;
    overflow-y: auto;
  }
  .modal-inner img {
    width: 100%;
    max-height: 85vh;
    object-fit: contain;
    box-shadow: 0 40px 80px -30px rgba(0,0,0,0.9);
  }
  .modal-text h3 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(1.8rem, 3vw, 2.6rem);
    line-height: 1.15;
    margin-bottom: 0.5rem;
  }
  .modal-text .modal-meta {
    color: var(--accent);
    font-style: italic;
    margin-bottom: 1.75rem;
    font-size: 1rem;
  }
  .modal-text p {
    color: var(--ink-soft);
    font-weight: 300;
    margin-bottom: 1rem;
  }
  .modal-text .info {
    margin-top: 1.75rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--line);
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0.5rem 1.5rem;
    font-size: 0.9rem;
  }
  .modal-text .info dt { color: var(--accent); font-style: italic; }
  .modal-text .info dd { color: var(--ink); }
  .close-btn {
    position: fixed;
    top: 2rem;
    right: 2rem;
    background: none;
    border: 1px solid var(--line);
    color: var(--ink);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.3s ease;
    z-index: 101;
  }
  .close-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: rotate(90deg);
  }

  /* Footer */
  footer {
    padding: 3rem 2rem;
    text-align: center;
    border-top: 1px solid var(--line);
    color: var(--ink-soft);
    font-size: 0.85rem;
    font-weight: 300;
  }
  footer .accent { color: var(--accent); font-style: italic; }

  /* Reveal animation */
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1s ease, transform 1s cubic-bezier(.2,.8,.2,1);
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 768px) {
    .modal-inner {
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }
    .modal-inner img { max-height: 50vh; }
    section.gallery { padding: 4rem 1.25rem 5rem; }
    .grid { gap: 2.5rem 1.25rem; }
  }
</style>
</head>
<body>

<header class="hero">
  <div class="eyebrow">The Canvas · Est. 2026</div>
  <h1 class="title">시간을 건너온<br><em>걸작들</em></h1>
  <p class="lead">한 폭의 그림은 그 시대의 빛과 공기, 화가의 호흡을 담습니다.<br />여덟 점의 작품을 통해 미술사를 거닐어 보세요.</p>
</header>

<section class="gallery">
  <div class="section-head reveal">
    <div class="eyebrow">Selected Works</div>
    <h2>큐레이션 컬렉션</h2>
    <p>르네상스부터 인상주의, 표현주의에 이르기까지 — 작품을 선택하면 자세히 감상할 수 있습니다.</p>
  </div>

  <div class="grid" id="grid"></div>
</section>

<div class="modal" id="modal" role="dialog" aria-modal="true">
  <button class="close-btn" id="closeBtn" aria-label="닫기">×</button>
  <div class="modal-inner" id="modalInner"></div>
</div>

<footer>
  <p>The Canvas Gallery · 모든 이미지는 <span class="accent">Wikimedia Commons</span> 퍼블릭 도메인에서 제공됩니다.</p>
  <p style="margin-top:0.5rem;">© 2026 — Made with reverence for the masters.</p>
</footer>

<script>
const works = [
  {
    title: '별이 빛나는 밤',
    titleEn: 'The Starry Night',
    artist: 'Vincent van Gogh',
    year: '1889',
    medium: '캔버스에 유채, 73.7 × 92.1 cm',
    location: '뉴욕 현대미술관 (MoMA)',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/1280px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg',
    desc: [
      '생레미 정신병원에 머물던 반 고흐가 새벽 동이 트기 직전 창밖을 그린 작품입니다. 휘몰아치는 푸른 하늘과 노란 별빛은 그가 본 풍경이 아니라, 그가 느낀 풍경입니다.',
      '편지에서 그는 "별을 보면 항상 꿈을 꾸게 된다"고 적었습니다. 이 그림은 고통과 황홀이 한 화폭에 공존하는, 후기 인상주의의 정점입니다.'
    ]
  },
  {
    title: '진주 귀걸이를 한 소녀',
    titleEn: 'Girl with a Pearl Earring',
    artist: 'Johannes Vermeer',
    year: 'c. 1665',
    medium: '캔버스에 유채, 44.5 × 39 cm',
    location: '헤이그 마우리츠하위스 미술관',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/1665_Girl_with_a_Pearl_Earring.jpg/800px-1665_Girl_with_a_Pearl_Earring.jpg',
    desc: [
      '"북유럽의 모나리자"로 불리는 이 작품은 특정 인물의 초상이 아닌 트로니(tronie) — 즉 인물 유형 연구화입니다. 어둠 속에서 고개를 돌린 소녀의 시선이 관람자를 사로잡습니다.',
      '귀걸이의 단 두 번의 흰 붓터치만으로 구현된 진주의 광택은, 페르메이르가 빛을 다루는 마술사였음을 증명합니다.'
    ]
  },
  {
    title: '키스',
    titleEn: 'The Kiss',
    artist: 'Gustav Klimt',
    year: '1907–1908',
    medium: '캔버스에 유채와 금박, 180 × 180 cm',
    location: '빈 벨베데레 미술관',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg/800px-The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg',
    desc: [
      '클림트의 "황금시기"를 대표하는 작품으로, 비잔틴 모자이크와 일본 판화의 영향이 짙게 배어 있습니다. 두 인물의 얼굴은 사실적으로 그려졌지만, 옷과 배경은 평면적인 황금 패턴으로 융합됩니다.',
      '벼랑 끝 꽃밭에 무릎 꿇은 연인의 모습은 사랑의 황홀과 그 위태로움을 동시에 담고 있습니다.'
    ]
  },
  {
    title: '인상, 해돋이',
    titleEn: 'Impression, Sunrise',
    artist: 'Claude Monet',
    year: '1872',
    medium: '캔버스에 유채, 48 × 63 cm',
    location: '파리 마르모탕 모네 미술관',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Monet_-_Impression%2C_Sunrise.jpg/1280px-Monet_-_Impression%2C_Sunrise.jpg',
    desc: [
      '르 아브르 항구의 새벽 안개를 그린 이 작품은, 한 평론가의 비아냥에서 "인상주의(Impressionism)"라는 사조의 이름을 탄생시켰습니다.',
      '윤곽선 대신 색의 진동으로 빛과 시간을 포착하는 모네의 방식은 회화의 역사를 영원히 바꿔놓았습니다. 주황빛 태양은 사실 회색 하늘과 같은 명도라고 알려져 있습니다.'
    ]
  },
  {
    title: '비너스의 탄생',
    titleEn: 'The Birth of Venus',
    artist: 'Sandro Botticelli',
    year: 'c. 1485',
    medium: '캔버스에 템페라, 172.5 × 278.9 cm',
    location: '피렌체 우피치 미술관',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Sandro_Botticelli_-_La_nascita_di_Venere_-_Google_Art_Project_-_edited.jpg/1280px-Sandro_Botticelli_-_La_nascita_di_Venere_-_Google_Art_Project_-_edited.jpg',
    desc: [
      '바다의 거품에서 태어난 사랑의 여신이 조개 위에 실려 키프로스 해안에 닿는 순간을 담았습니다. 르네상스 회화 중 최초로 신화 속 여신의 누드를 정면에 그린 작품으로 평가됩니다.',
      '보티첼리는 윤곽선의 우아함과 시적인 운율로 고대의 이상을 되살려냈습니다 — 이것이 메디치 가문이 후원했던 르네상스의 정수입니다.'
    ]
  },
  {
    title: '절규',
    titleEn: 'The Scream',
    artist: 'Edvard Munch',
    year: '1893',
    medium: '판지에 유채, 템페라, 파스텔, 91 × 73.5 cm',
    location: '오슬로 노르웨이 국립미술관',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Edvard_Munch%2C_1893%2C_The_Scream%2C_oil%2C_tempera_and_pastel_on_cardboard%2C_91_x_73_cm%2C_National_Gallery_of_Norway.jpg/800px-Edvard_Munch%2C_1893%2C_The_Scream%2C_oil%2C_tempera_and_pastel_on_cardboard%2C_91_x_73_cm%2C_National_Gallery_of_Norway.jpg',
    desc: [
      '뭉크는 일기에 적었습니다 — "친구들과 길을 걷던 중 해가 졌다. 갑자기 하늘이 핏빛으로 변했고, 나는 자연을 관통하는 끝없는 비명을 들었다."',
      '비명을 지르는 것은 인물이 아닙니다. 비명을 지르는 것은 자연이며, 인물은 그 비명을 막으려 귀를 틀어막은 것입니다. 표현주의의 가장 강렬한 선언입니다.'
    ]
  },
  {
    title: '물랭 드 라 갈레트의 무도회',
    titleEn: 'Bal du moulin de la Galette',
    artist: 'Pierre-Auguste Renoir',
    year: '1876',
    medium: '캔버스에 유채, 131 × 175 cm',
    location: '파리 오르세 미술관',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/Pierre-Auguste_Renoir%2C_Le_Moulin_de_la_Galette.jpg/1280px-Pierre-Auguste_Renoir%2C_Le_Moulin_de_la_Galette.jpg',
    desc: [
      '몽마르트르의 야외 무도장에서 일요일 오후를 즐기는 파리지앵들. 나뭇잎 사이를 통과한 햇빛이 사람들의 얼굴과 옷자락 위에 점점이 흩뿌려집니다.',
      '르누아르는 일상의 행복을 그리는 화가였습니다. 이 작품은 인상주의가 단지 풍경의 빛이 아닌, 삶의 빛을 어떻게 다룰 수 있는지 보여줍니다.'
    ]
  },
  {
    title: '모나리자',
    titleEn: 'Mona Lisa',
    artist: 'Leonardo da Vinci',
    year: 'c. 1503–1519',
    medium: '포플러 패널에 유채, 77 × 53 cm',
    location: '파리 루브르 박물관',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg/800px-Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg',
    desc: [
      '피렌체 상인 프란체스코 델 조콘도의 부인 리자 게라르디니의 초상으로 알려져 있습니다. 다 빈치는 이 작은 패널화를 죽을 때까지 손에서 놓지 않았습니다.',
      '윤곽선을 지우고 색채와 명암을 부드럽게 융합하는 "스푸마토" 기법은, 그녀의 미소를 영원히 풀리지 않는 수수께끼로 만들었습니다.'
    ]
  }
];

const grid = document.getElementById('grid');
const modal = document.getElementById('modal');
const modalInner = document.getElementById('modalInner');
const closeBtn = document.getElementById('closeBtn');

works.forEach((w, i) => {
  const card = document.createElement('article');
  card.className = 'card reveal';
  card.style.transitionDelay = (i % 3) * 0.1 + 's';
  card.innerHTML = `
    <div class="frame"><img src="${w.img}" alt="${w.title} — ${w.artist}" loading="lazy" /></div>
    <h3>${w.title}</h3>
    <p class="meta"><span class="artist">${w.artist}</span> · ${w.year}</p>
  `;
  card.addEventListener('click', () => openModal(w));
  grid.appendChild(card);
});

function openModal(w) {
  modalInner.innerHTML = `
    <img src="${w.img}" alt="${w.title}" />
    <div class="modal-text">
      <h3>${w.title}</h3>
      <p class="modal-meta">${w.titleEn} · ${w.artist}, ${w.year}</p>
      ${w.desc.map(p => `<p>${p}</p>`).join('')}
      <dl class="info">
        <dt>재료</dt><dd>${w.medium}</dd>
        <dt>소장처</dt><dd>${w.location}</dd>
      </dl>
    </div>
  `;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modal.classList.remove('open');
  document.body.style.overflow = '';
}

closeBtn.addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Reveal on scroll
const io = new IntersectionObserver((entries) => {
  entries.forEach(en => {
    if (en.isIntersecting) {
      en.target.classList.add('visible');
      io.unobserve(en.target);
    }
  });
}, { threshold: 0.15 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));
</script>

</body>
</html>
